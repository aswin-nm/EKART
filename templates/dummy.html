<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - EKART</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        .dummy-page-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            text-align: center;
            min-height: 50vh;
        }
        .dummy-page-container h1 {
            font-size: 40px;
            color: #ff523b;
            margin-bottom: 20px;
        }
        .dummy-page-container p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <a href="{% url 'products' %}"><img src="{% static 'images/logo.png' %}" alt="logo" width="125px"></a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="{% url 'products' %}">Home</a></li>
                    <li><a href="{% url 'productslist' %}">Products</a></li>
                    {% if not user.is_authenticated %}
                    <li><a href="{% url 'customer_login' %}">Account</a></li>
                    {% else %}
                    <li><a href="{% url 'signout' %}">Logout</a></li>
                    {% endif %}
                </ul>
            </nav>
            <a href="{% url 'cart' %}"><img src="{% static 'images/cart.png' %}" width="30px" height="30px"></a>
        </div>
    </div>

    <div class="dummy-page-container">
        <h1>Coming Soon</h1>
        <p>This page is currently under construction. Please check back later.</p>
        <a href="{% url 'products' %}" class="btn">Return to Home</a>
    </div>

</body>
</html>
